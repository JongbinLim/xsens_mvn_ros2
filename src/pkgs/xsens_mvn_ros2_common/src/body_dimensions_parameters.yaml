body_dimensions:
  bodyDimension:
    bodyHeight:
      type: double
      default_value: 1.80
      description: "Full body height in metres"
      validation:
        bounds<>: [0.5, 2.5]
    footSize:
      type: double
      default_value: 0.26
      description: "Foot length in metres"
      validation:
        bounds<>: [0.1, 0.5]
    shoulderHeight:
      type: double
      default_value: 1.45
      description: "Shoulder height from floor in metres"
      validation:
        bounds<>: [0.3, 2.2]
    shoulderWidth:
      type: double
      default_value: 0.38
      description: "Shoulder width (left to right) in metres"
      validation:
        bounds<>: [0.1, 0.8]
    elbowSpan:
      type: double
      default_value: 0.94
      description: "Elbow span in metres"
      validation:
        bounds<>: [0.1, 1.5]
    wristSpan:
      type: double
      default_value: 1.43
      description: "Wrist span in metres"
      validation:
        bounds<>: [0.3, 2.0]
    armSpan:
      type: double
      default_value: 1.80
      description: "Full arm span in metres"
      validation:
        bounds<>: [0.5, 3.0]
    hipHeight:
      type: double
      default_value: 0.87
      description: "Hip height from floor in metres"
      validation:
        bounds<>: [0.3, 1.5]
    hipWidth:
      type: double
      default_value: 0.24
      description: "Hip width in metres"
      validation:
        bounds<>: [0.1, 0.6]
    kneeHeight:
      type: double
      default_value: 0.49
      description: "Knee height from floor in metres"
      validation:
        bounds<>: [0.1, 1.0]
    ankleHeight:
      type: double
      default_value: 0.08
      description: "Ankle height from floor in metres"
      validation:
        bounds<>: [0.01, 0.3]
    shoeSoleHeight:
      type: double
      default_value: 0.0
      description: "Shoe sole height in metres"
      validation:
        bounds<>: [0.0, 0.2]
